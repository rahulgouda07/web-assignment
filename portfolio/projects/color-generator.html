<!DOCTYPE html>
<html>
<head>
  <title>Random Color Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body id="bg"
      class="flex flex-col justify-center items-center min-h-screen transition-all duration-700">

  <div class="bg-white/90 backdrop-blur p-8 rounded-2xl shadow-xl text-center">
    <h2 class="text-2xl font-bold mb-2">Random Color Generator</h2>

    <p id="code" class="text-lg mb-4 font-mono text-purple-700"></p>

    <button onclick="generateColor()"
      class="px-6 py-3 bg-purple-600 text-white rounded-xl shadow hover:scale-110 hover:bg-purple-700 transition">
      Generate Color
    </button>
  </div>

<script>
function generateColor() {
  let color = "#" + Math.floor(Math.random()*16777215).toString(16);
  document.getElementById("bg").style.background = color;
  document.getElementById("code").innerText = "Current Color: " + color;
}
generateColor();
</script>
</body>
</html>
