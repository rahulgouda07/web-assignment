<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Quiz App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="card dashboard-container">
        <h1 id="welcomeMessage">Welcome!</h1>
        <p>Ready to test your JavaScript knowledge?</p>
        <button onclick="window.location.href='quiz.html'" class="btn primary-btn">Start Quiz</button>
        <button id="logoutBtn" class="btn secondary-btn">Logout</button>
    </div>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            const user = getCurrentUser();
            if(user) {
                document.getElementById('welcomeMessage').innerText = `Welcome, ${user.username}!`;
            }
            document.getElementById('logoutBtn').addEventListener('click', logout);
        });
    </script>
</body>
</html>
