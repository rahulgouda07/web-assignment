<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vibrant Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculator">

    <input type="text" id="display" readonly>

    <div class="top-buttons">
        <button onclick="toggleHistory()" class="history-btn">History</button>
        <button onclick="clearHistory()" class="clear-history">Clear History</button>
    </div>

    <div id="historyPanel" class="history-panel"></div>

    <div class="buttons">

        <button onclick="clearDisplay()" class="operator">C</button>
        <button onclick="deleteLast()" class="operator">⌫</button>
        <button onclick="append('%')" class="operator">%</button>
        <button onclick="append('/')" class="operator">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button onclick="append('*')" class="operator">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button onclick="append('-')" class="operator">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button onclick="append('+')" class="operator">+</button>

        <button onclick="append('0')" class="zero">0</button>
        <button onclick="append('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
